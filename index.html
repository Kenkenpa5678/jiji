                    <span className="bg-emerald-100 text-emerald-800 px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap ml-4">
                        {questionsList[currentIndex].category}
                    </span>
                    </div>
                    
                    <h2 className="text-xl md:text-2xl font-bold mb-8 text-slate-800 leading-relaxed">
                    {questionsList[currentIndex].question}
                    </h2>
                    
                    <div className="space-y-3">
                    {questionsList[currentIndex].options.map((opt, i) => {
                        const isCorrect = opt === questionsList[currentIndex].answer;
                        const isSelected = selectedAnswer === opt;
                        let btnClass = "w-full text-left p-4 md:p-5 rounded-2xl border-2 transition-all duration-200 font-bold ";
                        
                        if (!isAnswered) {
                            btnClass += "border-slate-200 bg-white hover:border-emerald-400 hover:bg-emerald-50 text-slate-700";
                        } else {
                            if (isCorrect) btnClass += "border-emerald-500 bg-emerald-50 text-emerald-800 shadow-sm";
                            else if (isSelected) btnClass += "border-rose-500 bg-rose-50 text-rose-800 shadow-sm";
                            else btnClass += "border-slate-100 bg-slate-50 text-slate-400 opacity-60";
                        }
                        
                        return (
                        <button 
                            key={i} 
                            disabled={isAnswered}
                            className={btnClass}
                            onClick={() => handleAnswer(opt)}
                        >
                            <div className="flex items-center justify-between">
                                <span className="leading-snug">{opt}</span>
                                {isAnswered && isCorrect && <CheckCircle2 className="text-emerald-500 w-6 h-6 flex-shrink-0 ml-3" />}
                                {isAnswered && isSelected && !isCorrect && <XCircle className="text-rose-500 w-6 h-6 flex-shrink-0 ml-3" />}
                            </div>
                        </button>
                        );
                    })}
                    </div>
                    
                    {isAnswered && (
                    <div className="mt-8 p-5 bg-slate-50 rounded-2xl border border-slate-200 animate-fade-in relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-1 h-full bg-emerald-400"></div>
                        <p className="font-bold text-slate-700 mb-2 flex items-center gap-2">
                        <BookOpen className="w-4 h-4 text-emerald-500" /> ニュースの背景・解説
                        </p>
                        <p className="text-slate-600 text-sm md:text-base leading-relaxed font-medium">
                        {questionsList[currentIndex].explanation}
                        </p>
                    </div>
                    )}
                    
                    {isAnswered && (
                    <button 
                        onClick={nextQuestion}
                        className="mt-8 w-full bg-slate-800 text-white font-bold py-4 rounded-2xl hover:bg-slate-700 shadow-md transition-all flex items-center justify-center gap-2"
                    >
                        {currentIndex === questionsList.length - 1 ? '結果を見る' : '次の問題へ'}
                        <ArrowRight className="w-5 h-5" />
                    </button>
                    )}
                </div>
                </div>
            );

            const renderFlashcard = () => (
                <div className="max-w-md mx-auto w-full p-2 animate-fade-in pb-20">
                <div className="mb-6 flex justify-between items-center px-2 text-slate-500 font-bold">
                    <span>単語帳 {currentIndex + 1} / {questionsList.length}</span>
                </div>

                <div 
                    className="relative w-full h-[420px] cursor-pointer"
                    style={{ perspective: '1000px' }}
                    onClick={() => setIsFlipped(!isFlipped)}
                >
                    <div 
                    className="w-full h-full transition-transform duration-500 relative"
                    style={{ 
                        transformStyle: 'preserve-3d', 
                        transform: isFlipped ? 'rotateY(180deg)' : 'rotateY(0deg)' 
                    }}
                    >
                    <div 
                        className="absolute w-full h-full bg-white border border-slate-200 rounded-3xl shadow-sm p-8 flex flex-col items-center justify-center"
                        style={{ backfaceVisibility: 'hidden' }}
                    >
                        <span className="absolute top-6 left-6 bg-emerald-100 text-emerald-800 px-3 py-1 rounded-full text-xs font-bold">
                        {questionsList[currentIndex].category}
                        </span>
                        <h3 className="text-xl md:text-2xl font-bold text-center text-slate-800 leading-relaxed mt-4">
                        {questionsList[currentIndex].question}
                        </h3>
                        <p className="absolute bottom-6 text-slate-400 text-sm font-bold flex items-center gap-2 bg-slate-50 px-4 py-2 rounded-full">
                        <RotateCcw className="w-4 h-4" /> タップして答えを見る
                        </p>
                    </div>
                    
                    <div 
                        className="absolute w-full h-full bg-gradient-to-br from-emerald-600 to-teal-700 rounded-3xl shadow-lg p-8 flex flex-col items-center justify-center text-white"
                        style={{ backfaceVisibility: 'hidden', transform: 'rotateY(180deg)' }}
                    >
                        <span className="absolute top-6 left-6 bg-white/20 px-3 py-1 rounded-full text-xs font-bold backdrop-blur-sm">
                        解答・解説
                        </span>
                        <h3 className="text-2xl md:text-3xl font-extrabold text-center mb-6 mt-4 leading-tight">
                        {questionsList[currentIndex].answer}
                        </h3>
                        <div className="w-full h-px bg-white/20 mb-6"></div>
                        <p className="text-sm md:text-base text-center leading-relaxed text-emerald-50 font-medium">
                        {questionsList[currentIndex].explanation}
                        </p>
                    </div>
                    </div>
                </div>
                
                <div className="flex justify-between items-center mt-10 px-2">
                    <button 
                        onClick={prevFlashcard} 
                        disabled={currentIndex === 0} 
                        className="p-4 rounded-full bg-white border border-slate-200 shadow-sm hover:bg-slate-50 disabled:opacity-30 transition-colors"
                    >
                        <ArrowLeft className="w-6 h-6 text-slate-700" />
                    </button>
                    <div className="text-sm font-bold text-slate-400">
                        {currentIndex + 1} / {questionsList.length}
                    </div>
                    <button 
                        onClick={nextFlashcard} 
                        disabled={currentIndex === questionsList.length - 1} 
                        className="p-4 rounded-full bg-white border border-slate-200 shadow-sm hover:bg-slate-50 disabled:opacity-30 transition-colors"
                    >
                        <ArrowRight className="w-6 h-6 text-slate-700" />
                    </button>
                </div>
                </div>
            );

            const renderResult = () => (
                <div className="max-w-xl mx-auto text-center space-y-8 animate-fade-in pb-10">
                <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-8 md:p-12">
                    <div className="inline-flex items-center justify-center p-6 bg-yellow-50 rounded-full mb-6">
                    <Trophy className="w-20 h-20 text-yellow-500" />
                    </div>
                    <h2 className="text-2xl font-bold text-slate-800 mb-2">クイズ結果</h2>
                    <p className="text-slate-500 mb-8 font-bold">全 {questionsList.length} 問中...</p>
                    
                    <div className="text-7xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-600 to-teal-600 mb-10">
                    {score} <span className="text-3xl text-slate-300">問正解</span>
                    </div>

                    <div className="flex flex-col sm:flex-row gap-4 justify-center">
                    <button 
                        onClick={() => startApp('quiz')}
                        className="w-full sm:w-auto px-8 py-4 bg-emerald-600 text-white font-bold rounded-2xl shadow-md hover:bg-emerald-700 transition-colors inline-flex items-center justify-center gap-2"
                    >
                        <RotateCcw className="w-5 h-5" /> もう一度挑戦
                    </button>
                    <button 
                        onClick={() => setView('home')}
                        className="w-full sm:w-auto px-8 py-4 bg-slate-100 text-slate-700 font-bold rounded-2xl hover:bg-slate-200 transition-colors inline-flex items-center justify-center gap-2"
                    >
                        <ListIcon className="w-5 h-5" /> ホームに戻る
                    </button>
                    </div>
                </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-slate-50 font-sans text-slate-800 selection:bg-emerald-200">
                    <header className="bg-white border-b border-slate-200 sticky top-0 z-50">
                    <div className="container mx-auto px-4 h-16 flex items-center justify-between">
                        <div 
                        className="flex items-center gap-2 cursor-pointer group" 
                        onClick={() => setView('home')}
                        >
                        <Clock className="w-6 h-6 text-emerald-600 group-hover:rotate-12 transition-transform" />
                        <span className="font-extrabold text-lg tracking-tight text-slate-800">
                            時事マスター<span className="text-emerald-600">春号</span>
                        </span>
                        </div>
                        {view !== 'home' && (
                        <button 
                            onClick={() => setView('home')} 
                            className="text-sm font-bold text-slate-500 hover:text-slate-800 flex items-center gap-1 transition-colors px-3 py-2 rounded-lg hover:bg-slate-100"
                        >
                            <ArrowLeft className="w-4 h-4" /> 終了する
                        </button>
                        )}
                    </div>
                    </header>
                    
                    <main className="container mx-auto p-4 py-8 md:py-12">
                        {view === 'home' && renderHome()}
                        {view === 'quiz' && renderQuiz()}
                        {view === 'flashcard' && renderFlashcard()}
                        {view === 'result' && renderResult()}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
